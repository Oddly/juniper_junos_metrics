title: JunOS Storage Metrics
type: metrics
streams:
  - input: cel
    vars:
      - name: period
        type: text
        title: Collection Interval
        description: How often to poll the JunOS API for storage metrics.
        required: true
        show_user: true
        default: 300s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - juniper-junos
          - forwarded
    title: JunOS Storage Metrics
    description: Collect storage metrics from the JunOS REST API
elasticsearch:
  index_mode: time_series
