- name: juniper.junos.storage
  type: group
  fields:
    - name: filesystem_name
      type: keyword
      dimension: true
      description: Filesystem device name.
    - name: mounted_on
      type: keyword
      dimension: true
      description: Mount point.
    - name: total_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Total filesystem size in bytes.
    - name: used_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Used filesystem size in bytes.
    - name: available_bytes
      type: long
      metric_type: gauge
      unit: byte
      description: Available filesystem size in bytes.
    - name: used_percent
      type: float
      metric_type: gauge
      unit: percent
      description: Filesystem usage percentage.
- name: system.filesystem.usage
  type: long
  metric_type: gauge
  unit: byte
  description: Filesystem used bytes, mapped from juniper.junos.storage.used_bytes.
- name: system.filesystem.utilization
  type: float
  metric_type: gauge
  unit: "1"
  description: Filesystem utilization as a fraction from 0 to 1, mapped from used_percent divided by 100.
