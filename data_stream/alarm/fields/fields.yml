- name: juniper.junos.alarm
  type: group
  fields:
    - name: time
      type: date
      description: Time the alarm was raised.
    - name: class
      type: keyword
      description: Alarm class (Major, Minor, etc.).
    - name: type
      type: keyword
      description: Alarm type (Interface, Chassis, etc.).
    - name: description
      type: keyword
      description: Full alarm description.
    - name: short_description
      type: keyword
      description: Short alarm description.
