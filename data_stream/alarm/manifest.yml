title: JunOS Alarms
type: logs
streams:
  - input: cel
    vars:
      - name: period
        type: text
        title: Collection Interval
        description: How often to poll the JunOS API for alarms.
        required: true
        show_user: true
        default: 60s
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: false
        default:
          - juniper-junos
          - forwarded
    title: JunOS Alarms
    description: Collect alarm events from the JunOS REST API
