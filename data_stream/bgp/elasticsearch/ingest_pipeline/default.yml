---
description: Pipeline for JunOS BGP metrics.
processors:
  - set:
      tag: set_event_kind
      field: event.kind
      value: metric
  - set:
      tag: set_event_module
      field: event.module
      value: juniper_junos_metrics
  - set:
      tag: set_event_dataset
      field: event.dataset
      value: juniper_junos_metrics.bgp
  - set:
      tag: set_observer_vendor
      field: observer.vendor
      value: Juniper
  - set:
      tag: set_observer_product
      field: observer.product
      value: JunOS
  - set:
      tag: set_observer_type
      field: observer.type
      value: router

  # Parse JSON from message
  - json:
      tag: json_parse_message
      field: message
      target_field: _temp.raw

  # Flatten JunOS JSON: unwrap [{"data": "value"}] pattern, with nested peer object
  - script:
      tag: script_flatten_junos_json
      lang: painless
      description: Unwrap the JunOS [{"data":"value"}] array pattern into flat fields, including nested peer object.
      source: |
        def raw = ctx._temp?.raw;
        if (raw == null) { return; }
        def flat = new HashMap();
        for (def entry : raw.entrySet()) {
          def key = entry.getKey();
          def val = entry.getValue();
          if (key == 'peer') {
            if (val instanceof Map) {
              def peerFlat = new HashMap();
              for (def pe : val.entrySet()) {
                def pv = pe.getValue();
                if (pv instanceof List && pv.size() > 0 && pv.get(0) instanceof Map) {
                  def first = pv.get(0);
                  if (first.containsKey('data')) {
                    peerFlat.put(pe.getKey(), first.get('data'));
                  }
                  if (first.containsKey('attributes')) {
                    peerFlat.put(pe.getKey() + '_attrs', first.get('attributes'));
                  }
                }
              }
              flat.put('peer', peerFlat);
            }
          } else if (val instanceof List && val.size() > 0 && val.get(0) instanceof Map) {
            def first = val.get(0);
            if (first.containsKey('data')) {
              flat.put(key, first.get('data'));
            }
            if (first.containsKey('attributes')) {
              flat.put(key + '_attrs', first.get('attributes'));
            }
          }
        }
        ctx._temp.bgp = flat;

  # Global BGP stats
  - convert:
      tag: convert_group_count
      if: ctx._temp?.bgp?.get('group-count') != null
      field: _temp.bgp.group-count
      target_field: juniper.junos.bgp.group_count
      type: long
      ignore_failure: true
  - convert:
      tag: convert_peer_count
      if: ctx._temp?.bgp?.get('peer-count') != null
      field: _temp.bgp.peer-count
      target_field: juniper.junos.bgp.peer_count
      type: long
      ignore_failure: true
  - convert:
      tag: convert_down_peer_count
      if: ctx._temp?.bgp?.get('down-peer-count') != null
      field: _temp.bgp.down-peer-count
      target_field: juniper.junos.bgp.down_peer_count
      type: long
      ignore_failure: true

  # Peer identity fields
  - set:
      tag: set_peer_address
      if: ctx._temp?.bgp?.peer?.get('peer-address') != null
      field: juniper.junos.bgp.peer.address
      value: "{{_temp.bgp.peer.peer-address}}"
  - set:
      tag: set_peer_state
      if: ctx._temp?.bgp?.peer?.get('peer-state') != null
      field: juniper.junos.bgp.peer.state
      value: "{{_temp.bgp.peer.peer-state}}"

  # Peer numeric fields
  - convert:
      tag: convert_peer_as
      if: ctx._temp?.bgp?.peer?.get('peer-as') != null
      field: _temp.bgp.peer.peer-as
      target_field: juniper.junos.bgp.peer.as
      type: long
      ignore_failure: true
  - convert:
      tag: convert_input_messages
      if: ctx._temp?.bgp?.peer?.get('input-messages') != null
      field: _temp.bgp.peer.input-messages
      target_field: juniper.junos.bgp.peer.input_messages
      type: long
      ignore_failure: true
  - convert:
      tag: convert_output_messages
      if: ctx._temp?.bgp?.peer?.get('output-messages') != null
      field: _temp.bgp.peer.output-messages
      target_field: juniper.junos.bgp.peer.output_messages
      type: long
      ignore_failure: true
  - convert:
      tag: convert_flap_count
      if: ctx._temp?.bgp?.peer?.get('flap-count') != null
      field: _temp.bgp.peer.flap-count
      target_field: juniper.junos.bgp.peer.flap_count
      type: long
      ignore_failure: true

  # Elapsed time — use junos:seconds attribute from elapsed-time
  - script:
      tag: script_parse_elapsed_time
      lang: painless
      source: |
        def attrs = ctx._temp?.bgp?.peer?.get('elapsed-time_attrs');
        if (attrs != null && attrs.containsKey('junos:seconds')) {
          try {
            if (ctx.juniper == null) ctx.juniper = new HashMap();
            if (ctx.juniper.junos == null) ctx.juniper.junos = new HashMap();
            if (ctx.juniper.junos.bgp == null) ctx.juniper.junos.bgp = new HashMap();
            if (ctx.juniper.junos.bgp.peer == null) ctx.juniper.junos.bgp.peer = new HashMap();
            ctx.juniper.junos.bgp.peer.elapsed_time = Long.parseLong(attrs.get('junos:seconds').toString());
          } catch (Exception e) {}
        }

  # Clean up temporary fields
  - remove:
      tag: remove_temp_and_message
      field:
        - _temp
        - message
      ignore_missing: true

  # Remove event.original unless preserve tag is set
  - remove:
      tag: remove_event_original
      if: ctx.tags == null || !(ctx.tags.contains('preserve_original_event'))
      field: event.original
      ignore_missing: true

on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Processor {{ _ingest.on_failure_processor_type }} with tag {{ _ingest.on_failure_processor_tag }} failed with message {{ _ingest.on_failure_message }}"
